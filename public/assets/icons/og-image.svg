  <!-- main -->
  <text x="600" y="382" text-anchor="middle"
    font-family="'Playfair Display SC', 'Playfair Display', Georgia, serif"
    font-size="148" font-weight="700" fill="#C97B0A" letter-spacing="18">SMORZAR</text>
  <!-- highlight -->
