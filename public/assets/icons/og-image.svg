      <line x1="200" y1="0" x2="200" y2="210" stroke="#32302A" stroke-width="1.5"/>
      <line x1="0" y1="210" x2="200" y2="210" stroke="#32302A" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#26231E"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#3A3228" stroke-width="2"/>
