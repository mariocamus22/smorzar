<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = 'smorzar-theme';
          var t = localStorage.getItem(k);
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.colorScheme = t === 'dark' ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap"
      rel="stylesheet"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-visual"
    />
    <meta name="theme-color" content="#f5f3ee" />
    <meta name="description" content="Registro de tus almuerzos" />
    <title>Smorzar</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
